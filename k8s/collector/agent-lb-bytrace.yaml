# agent-lb-bytrace.yaml, 301 tail-sampling-at-scale, CORRECT state.
# The agent fans traces out to the multi-replica gateway StatefulSet using the
# loadbalancing exporter with routing_key: traceID. Every span of a given trace
# is hashed by trace ID to the SAME gateway replica, so each replica sees whole
# traces and tail sampling makes correct, complete decisions.
# Metrics and logs do not need per-trace affinity, so they go to the normal
# gateway Service (round-robin is fine for them).
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 384
    spike_limit_mib: 96
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    extract:
      metadata: [k8s.namespace.name, k8s.pod.name, k8s.pod.uid, k8s.node.name, k8s.deployment.name]
    pod_association:
      - sources: [{ from: resource_attribute, name: k8s.pod.uid }]
      - sources: [{ from: connection }]
  resource:
    attributes:
      - { key: lab.run.id, value: "${env:LAB_RUN_ID}", action: upsert }
      - { key: deployment.environment, value: lab, action: upsert }
      - { key: collector.tier, value: agent, action: upsert }
  batch:
    send_batch_size: 1000
    timeout: 5s

exporters:
  # Trace-ID-aware fan-out to the gateway replicas (resolved via the headless
  # service DNS). routing_key: traceID keeps every trace whole on one replica.
  loadbalancing:
    routing_key: traceID
    protocol:
      otlp:
        timeout: 5s
        tls:
          insecure: true
    resolver:
      dns:
        hostname: otel-gateway-hl.otel-lab.svc.cluster.local
        port: "4317"
  # Non-trace signals: ordinary OTLP to the gateway Service.
  otlp/gateway:
    endpoint: otel-gateway.otel-lab.svc.cluster.local:4317
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    metrics:
      level: detailed
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, batch]
      exporters: [loadbalancing]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, batch]
      exporters: [otlp/gateway]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, batch]
      exporters: [otlp/gateway]
