# agent-lb-byservice.yaml, 301 tail-sampling-at-scale, BROKEN state.
# Identical to agent-lb-bytrace.yaml EXCEPT routing_key is "service" instead of
# "traceID". Routing by service.name sends ALL order-service spans to one gateway
# replica and ALL payment-service spans to a DIFFERENT replica, so every
# two-service trace is SPLIT across replicas. Each replica's tail sampling then
# sees only half of each trace and makes its decision on a partial trace, so
# sampled traces are incomplete (and decisions are wrong). The fix is to change
# routing_key to traceID so each trace lands whole on one replica.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 384
    spike_limit_mib: 96
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    extract:
      metadata: [k8s.namespace.name, k8s.pod.name, k8s.pod.uid, k8s.node.name, k8s.deployment.name]
    pod_association:
      - sources: [{ from: resource_attribute, name: k8s.pod.uid }]
      - sources: [{ from: connection }]
  resource:
    attributes:
      - { key: lab.run.id, value: "${env:LAB_RUN_ID}", action: upsert }
      - { key: deployment.environment, value: lab, action: upsert }
      - { key: collector.tier, value: agent, action: upsert }
  batch:
    send_batch_size: 1000
    timeout: 5s

exporters:
  # FAULT: routing by service splits every multi-service trace across replicas,
  # so tail sampling never sees a whole trace. Change to routing_key: traceID.
  loadbalancing:
    routing_key: service
    protocol:
      otlp:
        timeout: 5s
        tls:
          insecure: true
    resolver:
      dns:
        hostname: otel-gateway-hl.otel-lab.svc.cluster.local
        port: "4317"
  otlp/gateway:
    endpoint: otel-gateway.otel-lab.svc.cluster.local:4317
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    metrics:
      level: detailed
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, batch]
      exporters: [loadbalancing]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, batch]
      exporters: [otlp/gateway]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, batch]
      exporters: [otlp/gateway]
