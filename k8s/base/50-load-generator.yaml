# =============================================================================
# 50-load-generator.yaml, continuous baseline traffic
# =============================================================================
# Sends a steady stream of orders so there is always data in New Relic during
# the lab. Randomizes user_tier and includes a user_email so the Module 7 PII
# redaction challenge has real emails flowing through the logs.
# Scale to 0 to pause:  kubectl -n otel-lab scale deploy/load-generator --replicas=0
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: otel-lab
  labels: { app: load-generator }
spec:
  replicas: 1
  selector:
    matchLabels: { app: load-generator }
  template:
    metadata:
      labels: { app: load-generator }
    spec:
      containers:
      - name: load-generator
        image: curlimages/curl:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            i=0
            echo "load-generator: ~1 rps, alternating tiers"
            while true; do
              if [ $((i % 2)) -eq 0 ]; then TIER=premium; else TIER=standard; fi
              curl -s -o /dev/null -X POST http://order-service.otel-lab.svc.cluster.local:8080/orders \
                -H "Content-Type: application/json" \
                -d "{\"item\":\"widget\",\"quantity\":3,\"user_tier\":\"${TIER}\",\"user_email\":\"${TIER}@example.com\"}"
              i=$((i + 1))
              sleep 1
            done
