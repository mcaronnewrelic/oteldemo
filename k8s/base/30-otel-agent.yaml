# =============================================================================
# 30-otel-agent.yaml, otel-agent DaemonSet + Service
# =============================================================================
# The collector config is NOT embedded here. It is supplied via the
# `otel-agent-config` ConfigMap, which the track setup script and apply-state.sh
# create from k8s/collector/agent-*.yaml (the editable raw configs). The agent
# DaemonSet mounts that ConfigMap at /etc/otelcol.
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-agent
  namespace: otel-lab
  labels: { app: otel-agent }
spec:
  selector:
    matchLabels: { app: otel-agent }
  template:
    metadata:
      labels: { app: otel-agent }
    spec:
      serviceAccountName: otel-agent
      containers:
      - name: otel-agent
        image: otel/opentelemetry-collector-contrib:0.100.0
        args: ["--config=/etc/otelcol/config.yaml"]
        env:
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef: { fieldPath: spec.nodeName }
        # NR credentials are unused while the agent forwards to the gateway, but
        # are present so the early challenges (01, 02) can run an agent that
        # exports straight to New Relic before the gateway is built.
        - name: NR_LICENSE_KEY
          valueFrom:
            secretKeyRef: { name: newrelic, key: license-key }
        - name: NR_OTLP_ENDPOINT
          valueFrom:
            secretKeyRef: { name: newrelic, key: otlp-endpoint }
        ports:
        - { name: otlp-grpc, containerPort: 4317 }
        - { name: otlp-http, containerPort: 4318 }
        - { name: metrics, containerPort: 8888 }
        - { name: health, containerPort: 13133 }
        volumeMounts:
        - { name: config, mountPath: /etc/otelcol }
        - { name: varlogpods, mountPath: /var/log/pods, readOnly: true }
        livenessProbe:
          httpGet: { path: /, port: 13133 }
          initialDelaySeconds: 10
      volumes:
      - name: config
        configMap: { name: otel-agent-config }
      - name: varlogpods
        hostPath: { path: /var/log/pods, type: Directory }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-agent
  namespace: otel-lab
spec:
  selector: { app: otel-agent }
  ports:
  - { name: otlp-grpc, port: 4317, targetPort: 4317 }
  - { name: otlp-http, port: 4318, targetPort: 4318 }
  - { name: metrics, port: 8888, targetPort: 8888 }
